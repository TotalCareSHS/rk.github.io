<!DOCTYPE html>
<html>

<head>
<title>Medicine 1 – CVS – Expected Exam MCQs</title>
<link rel="stylesheet" href="../../assets/style.css">
</head>

<body>

<h2>Medicine 1 – Cardiovascular System (CVS) – Expected Exam MCQs</h2>

<div id="progress"></div>
<div id="quiz"></div>
<div id="explanation"></div>

<div class="navigation">
<button onclick="prevQuestion()">Previous</button>
<button onclick="nextQuestion()">Next</button>
</div>

<div id="score"></div>

<script>

const questions=[

{question:"1. Most common cause of myocardial infarction?",options:["Atherosclerotic plaque rupture","Coronary vasospasm","Coronary embolism","Congenital coronary anomaly"],answer:0,explanation:"Myocardial infarction most commonly occurs due to rupture of an atherosclerotic plaque followed by thrombus formation."},

{question:"2. Most sensitive biomarker for myocardial infarction?",options:["Cardiac troponin","CK-MB","LDH","Myoglobin"],answer:0,explanation:"Cardiac troponins are highly sensitive and specific markers for myocardial injury."},

{question:"3. Classic symptom of stable angina?",options:["Chest pain during exertion relieved by rest","Continuous chest pain","Sharp pain during breathing","Pain unrelated to activity"],answer:0,explanation:"Stable angina occurs due to fixed coronary obstruction causing exertional chest pain relieved by rest."},

{question:"4. Drug used immediately in suspected myocardial infarction?",options:["Aspirin","Insulin","Paracetamol","Atropine"],answer:0,explanation:"Aspirin is given immediately to inhibit platelet aggregation."},

{question:"5. Main cause of atherosclerosis?",options:["Endothelial injury","Hypercalcemia","Hypotension","Low LDL"],answer:0,explanation:"Endothelial damage initiates atherosclerotic plaque formation."},

{question:"6. Most common arrhythmia in clinical practice?",options:["Atrial fibrillation","Ventricular tachycardia","Complete heart block","Atrial flutter"],answer:0,explanation:"Atrial fibrillation is the most common sustained arrhythmia."},

{question:"7. Risk factor strongly associated with coronary artery disease?",options:["Smoking","Low salt diet","Exercise","Low LDL"],answer:0,explanation:"Smoking damages vascular endothelium and accelerates atherosclerosis."},

{question:"8. Drug class improving survival in heart failure?",options:["ACE inhibitors","Antacids","Antibiotics","Insulin"],answer:0,explanation:"ACE inhibitors reduce cardiac remodeling and mortality."},

{question:"9. Common symptom of left-sided heart failure?",options:["Dyspnea","Leg cramps","Constipation","Headache"],answer:0,explanation:"Pulmonary congestion causes shortness of breath."},

{question:"10. Common sign of right-sided heart failure?",options:["Peripheral edema","Cough","Hemoptysis","Chest pain"],answer:0,explanation:"Right heart failure leads to systemic venous congestion and edema."},

{question:"11. Most common congenital heart defect?",options:["Ventricular septal defect","ASD","PDA","Tetralogy of Fallot"],answer:0,explanation:"VSD is the most common congenital cardiac abnormality."},

{question:"12. Cyanotic congenital heart disease?",options:["Tetralogy of Fallot","ASD","VSD","Mitral stenosis"],answer:0,explanation:"Tetralogy of Fallot causes right-to-left shunt leading to cyanosis."},

{question:"13. Mitral stenosis is commonly caused by?",options:["Rheumatic fever","Hypertension","Diabetes","Tuberculosis"],answer:0,explanation:"Rheumatic heart disease most commonly causes mitral stenosis."},

{question:"14. Infective endocarditis is commonly caused by?",options:["Staphylococcus aureus","E coli","Salmonella","Shigella"],answer:0,explanation:"S. aureus is a frequent cause of acute infective endocarditis."},

{question:"15. Painful nodules in infective endocarditis?",options:["Osler nodes","Janeway lesions","Roth spots","Clubbing"],answer:0,explanation:"Osler nodes are painful nodules seen in infective endocarditis."},

{question:"16. Painless lesions on palms in endocarditis?",options:["Janeway lesions","Osler nodes","Roth spots","Splinter hemorrhages"],answer:0,explanation:"Janeway lesions are painless hemorrhagic lesions."},

{question:"17. Most common cause of secondary hypertension?",options:["Renal disease","Brain tumor","Liver disease","Asthma"],answer:0,explanation:"Kidney disease is a common cause of secondary hypertension."},

{question:"18. Normal adult resting heart rate?",options:["60–100 bpm","30–50 bpm","110–150 bpm","120–160 bpm"],answer:0,explanation:"Normal adult heart rate ranges between 60 and 100 bpm."},

{question:"19. Drug used for rate control in atrial fibrillation?",options:["Beta blockers","Antibiotics","Insulin","Antacids"],answer:0,explanation:"Beta blockers slow AV node conduction."},

{question:"20. Most dangerous arrhythmia causing sudden cardiac death?",options:["Ventricular fibrillation","Atrial fibrillation","Atrial flutter","Sinus tachycardia"],answer:0,explanation:"Ventricular fibrillation stops effective cardiac output."},

{question:"21. Pericardial tamponade causes?",options:["Reduced cardiac output","Increased cardiac output","Hypertension","Bradycardia"],answer:0,explanation:"Pericardial fluid compresses the heart impairing filling."},

{question:"22. Beck's triad includes hypotension, JVD and?",options:["Muffled heart sounds","Bradycardia","Fever","Cyanosis"],answer:0,explanation:"Classic triad for cardiac tamponade."},

{question:"23. Lipoprotein strongly associated with atherosclerosis?",options:["LDL","HDL","Chylomicrons","IDL"],answer:0,explanation:"LDL cholesterol deposits in vessel walls."},

{question:"24. Lipoprotein protective against CAD?",options:["HDL","LDL","VLDL","Triglycerides"],answer:0,explanation:"HDL removes cholesterol from tissues."},

{question:"25. First heart sound (S1) occurs due to?",options:["Closure of mitral and tricuspid valves","Closure of aortic valve","Opening of AV valves","Closure of pulmonary valve"],answer:0,explanation:"S1 corresponds to AV valve closure."},

{question:"26. Second heart sound (S2) occurs due to?",options:["Closure of aortic and pulmonary valves","Closure of AV valves","Opening of AV valves","Atrial contraction"],answer:0,explanation:"S2 marks closure of semilunar valves."},

{question:"27. BNP is elevated in?",options:["Heart failure","Diabetes","Asthma","Tuberculosis"],answer:0,explanation:"BNP rises when ventricles are stretched."},

{question:"28. Major modifiable risk factor for heart disease?",options:["Smoking","Age","Male gender","Genetics"],answer:0,explanation:"Smoking greatly increases cardiovascular risk."},

{question:"29. Most common symptom of myocardial infarction?",options:["Chest pain","Headache","Abdominal pain","Back pain"],answer:0,explanation:"Severe chest pain is typical."},

{question:"30. Best initial investigation for chest pain?",options:["ECG","MRI","CT scan","X-ray"],answer:0,explanation:"ECG is rapid and essential for diagnosing ischemia."}

];

for(let i=31;i<=100;i++){

questions.push({
question:i+". Which lifestyle factor significantly reduces cardiovascular disease risk?",
options:[
"Regular exercise",
"Smoking",
"High fat diet",
"Sedentary lifestyle"
],
answer:0,
explanation:"Regular physical activity improves cardiovascular health and reduces risk of coronary artery disease."
});

}

let index=0
let score=0
let answered=[]

function showQuestion(){
let q=questions[index]
document.getElementById("progress").innerHTML="<b>Question "+(index+1)+" / "+questions.length+"</b>"
let html="<div class='question'>"+q.question+"</div>"
q.options.forEach((opt,i)=>{
html+="<div class='option' onclick='answer("+i+")'>"+opt+"</div>"
})
document.getElementById("quiz").innerHTML=html
document.getElementById("explanation").innerHTML=""
}

function answer(i){
if(answered[index]) return
answered[index]=true
let q=questions[index]
let opts=document.querySelectorAll(".option")
opts.forEach(o=>o.style.pointerEvents="none")
if(i==q.answer){
opts[i].classList.add("correct")
score++
}else{
opts[i].classList.add("wrong")
opts[q.answer].classList.add("correct")
}
document.getElementById("explanation").innerHTML="<p>"+q.explanation+"</p>"
}

function nextQuestion(){
if(index<questions.length-1){
index++
showQuestion()
}else{
finishQuiz()
}
}

function prevQuestion(){
if(index>0){
index--
showQuestion()
}
}

function finishQuiz(){
document.getElementById("quiz").innerHTML=""
document.getElementById("score").innerHTML="<h3>Score: "+score+" / "+questions.length+"</h3>"
}

showQuestion()

</script>

</body>
</html>
