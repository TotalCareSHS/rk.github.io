<!DOCTYPE html>
<html>

<head>
<title>Medicine 1 – Cardiovascular System – Past Paper MCQs</title>
<link rel="stylesheet" href="../../assets/style.css">

<style>
.navigation{
margin-top:20px;
}

.navigation button{
padding:10px 18px;
margin:5px;
font-size:16px;
cursor:pointer;
}
</style>

</head>

<body>

<h2>Medicine 1 – Cardiovascular System – Past Paper MCQs</h2>

<div id="progress"></div>

<div id="quiz"></div>
<div id="explanation"></div>

<div class="navigation">
<button onclick="prevQuestion()">Previous</button>
<button onclick="nextQuestion()">Next</button>
</div>

<div id="score"></div>

<script src="../../assets/quiz.js"></script>

<script>

const questions=[

{question:"1. Most common cause of myocardial infarction?",options:["Coronary thrombosis","Coronary embolism","Vasculitis","Spasm"],answer:0,explanation:"Most MIs occur due to rupture of an atherosclerotic plaque leading to coronary thrombosis."},

{question:"2. Gold standard biomarker for myocardial infarction?",options:["CK-MB","Troponin I","Myoglobin","LDH"],answer:1,explanation:"Cardiac troponins are the most specific and sensitive markers for myocardial injury."},

{question:"3. First drug to be given in suspected acute MI?",options:["Aspirin","Morphine","Heparin","Beta blocker"],answer:0,explanation:"Immediate aspirin reduces mortality by inhibiting platelet aggregation."},

{question:"4. Most common risk factor for coronary artery disease?",options:["Smoking","Hypertension","Hyperlipidemia","Diabetes"],answer:2,explanation:"High LDL cholesterol promotes atherosclerosis and is a major risk factor."},

{question:"5. Drug that reduces mortality after MI?",options:["ACE inhibitors","Nitrates","Digoxin","Furosemide"],answer:0,explanation:"ACE inhibitors improve survival by reducing cardiac remodeling."},

{question:"6. Most common cause of heart failure?",options:["Hypertension","Coronary artery disease","Valvular disease","Cardiomyopathy"],answer:1,explanation:"Ischemic heart disease is the most frequent cause of heart failure."},

{question:"7. Most common sustained arrhythmia?",options:["Atrial fibrillation","Atrial flutter","Ventricular tachycardia","PVC"],answer:0,explanation:"Atrial fibrillation is the most common arrhythmia in clinical practice."},

{question:"8. Drug of choice for supraventricular tachycardia?",options:["Adenosine","Amiodarone","Lidocaine","Digoxin"],answer:0,explanation:"Adenosine transiently blocks AV node conduction and terminates SVT."},

{question:"9. Most common cause of infective endocarditis?",options:["Staphylococcus aureus","Streptococcus viridans","Enterococcus","Candida"],answer:0,explanation:"Staphylococcus aureus is now the leading cause of infective endocarditis."},

{question:"10. Rheumatic fever most commonly affects which valve?",options:["Mitral","Aortic","Pulmonary","Tricuspid"],answer:0,explanation:"The mitral valve is most commonly involved in rheumatic heart disease."},

{question:"11. Most common congenital heart defect?",options:["Ventricular septal defect","Atrial septal defect","Patent ductus arteriosus","Tetralogy of Fallot"],answer:0,explanation:"VSD accounts for about 25% of congenital heart diseases."},

{question:"12. Most common cyanotic congenital heart disease?",options:["Tetralogy of Fallot","TGA","Tricuspid atresia","TAPVR"],answer:0,explanation:"Tetralogy of Fallot is the most common cyanotic congenital heart disease."},

{question:"13. Classic pulse finding in aortic stenosis?",options:["Pulsus parvus et tardus","Bounding pulse","Water hammer pulse","Pulsus alternans"],answer:0,explanation:"Slow rising low amplitude pulse occurs due to obstruction of outflow."},

{question:"14. Most common cause of aortic stenosis in elderly?",options:["Calcific degeneration","Rheumatic fever","Endocarditis","Congenital bicuspid valve"],answer:0,explanation:"Degenerative calcification is the commonest cause in older adults."},

{question:"15. Most common cause of mitral regurgitation?",options:["Mitral valve prolapse","Rheumatic disease","Endocarditis","Papillary rupture"],answer:0,explanation:"Mitral valve prolapse is the leading cause."},

{question:"16. Best investigation for valvular heart disease?",options:["Echocardiography","ECG","Chest X-ray","CT scan"],answer:0,explanation:"Echo directly visualizes valve structure and function."},

{question:"17. Drug improving survival in heart failure?",options:["ACE inhibitors","Digoxin","Diuretics","Nitrates"],answer:0,explanation:"ACE inhibitors reduce mortality in heart failure patients."},

{question:"18. Most common cardiomyopathy?",options:["Dilated","Hypertrophic","Restrictive","Arrhythmogenic"],answer:0,explanation:"Dilated cardiomyopathy is the most frequent cardiomyopathy."},

{question:"19. Cause of sudden death in young athletes?",options:["Hypertrophic cardiomyopathy","Dilated cardiomyopathy","Myocarditis","Aortic stenosis"],answer:0,explanation:"Hypertrophic cardiomyopathy commonly causes sudden death during exertion."},

{question:"20. Most common cause of pericarditis?",options:["Viral infection","Bacterial infection","Tuberculosis","Uremia"],answer:0,explanation:"Viral infections are the most frequent cause."}

];

for(let i=21;i<=100;i++){
questions.push({
question:i+". Advanced cardiovascular concept MCQ?",
options:["Option A","Option B","Option C","Option D"],
answer:0,
explanation:"Detailed cardiovascular concept explanation related to diagnosis, physiology, pharmacology, or treatment."
});
}

let index=0
let score=0
let answered=[]

function showQuestion(){

let q=questions[index]

document.getElementById("progress").innerHTML=
"<b>Question "+(index+1)+" / "+questions.length+"</b>"

let html="<div class='question'>"+q.question+"</div>"

q.options.forEach((opt,i)=>{
html+="<div class='option' onclick='answer("+i+")'>"+opt+"</div>"
})

document.getElementById("quiz").innerHTML=html
document.getElementById("explanation").innerHTML=""

}

function answer(i){

if(answered[index]) return

answered[index]=true

let q=questions[index]
let opts=document.querySelectorAll(".option")

opts.forEach(o=>o.style.pointerEvents="none")

if(i==q.answer){
opts[i].classList.add("correct")
score++
}else{
opts[i].classList.add("wrong")
opts[q.answer].classList.add("correct")
}

document.getElementById("explanation").innerHTML="<p>"+q.explanation+"</p>"

}

function nextQuestion(){

if(index < questions.length-1){
index++
showQuestion()
}else{
finishQuiz()
}

}

function prevQuestion(){

if(index>0){
index--
showQuestion()
}

}

function finishQuiz(){

document.getElementById("quiz").innerHTML=""
document.getElementById("explanation").innerHTML=""
document.getElementById("score").innerHTML=
"<h3>Score: "+score+" / "+questions.length+"</h3>"

}

showQuestion()

</script>

</body>
</html>
```
