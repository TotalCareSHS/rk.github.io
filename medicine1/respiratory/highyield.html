<!DOCTYPE html>
<html>
<head>
<h2>Medicine 1 – Respiratory System – High Yield MCQs</h2>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<div id="stats">
Correct: <span id="correct">0</span> |
Wrong: <span id="wrong">0</span>
</div>

<div id="timer">Time Left: 30:00</div>
  
<link rel="stylesheet" href="../../assets/style.css">

</head>

<body>

<h2>Medicine 1 – Respiratory System – High Yield MCQs</h2>

<div id="progress"></div>
<div id="quiz"></div>
<div id="explanation"></div>

<div class="navigation">
<button onclick="prevQuestion()">Previous</button>
<button onclick="nextQuestion()">Next</button>
</div>

<div id="score"></div>
  <div id="review"></div>

<script>

const questions=[

{question:"1. The most common cause of COPD is:",options:["Air pollution","Smoking","Genetic mutation","Tuberculosis"],answer:1,explanation:"Cigarette smoking is the leading cause of COPD due to chronic airway inflammation."},

{question:"2. Which lung cancer is most strongly associated with smoking?",options:["Adenocarcinoma","Small cell carcinoma","Carcinoid tumor","Hamartoma"],answer:1,explanation:"Small cell lung carcinoma has the strongest association with cigarette smoking."},

{question:"3. Which organism most commonly causes community-acquired pneumonia?",options:["Streptococcus pneumoniae","Mycoplasma pneumoniae","Klebsiella pneumoniae","Pseudomonas aeruginosa"],answer:0,explanation:"Streptococcus pneumoniae is the most common cause of community-acquired pneumonia."},

{question:"4. Which condition produces reversible airway obstruction?",options:["COPD","Bronchiectasis","Bronchial asthma","Pulmonary fibrosis"],answer:2,explanation:"Asthma causes reversible airway obstruction due to bronchial hyperresponsiveness."},

{question:"5. Which investigation is most useful in diagnosing pulmonary embolism?",options:["Chest X-ray","CT pulmonary angiography","Spirometry","Sputum culture"],answer:1,explanation:"CT pulmonary angiography is the diagnostic gold standard for pulmonary embolism."},

{question:"6. The most common symptom of lung cancer is:",options:["Chronic cough","Hematemesis","Diarrhea","Headache"],answer:0,explanation:"Persistent cough is the most common presenting symptom of lung cancer."},

{question:"7. Which disease causes 'honeycomb lung' appearance?",options:["Pulmonary fibrosis","Bronchitis","Asthma","Tuberculosis"],answer:0,explanation:"Pulmonary fibrosis causes honeycomb lung due to extensive interstitial fibrosis."},

{question:"8. Which physical sign indicates pleural effusion?",options:["Hyperresonance","Stony dull percussion","Wheezing","Crackles"],answer:1,explanation:"Pleural effusion produces stony dullness on percussion due to fluid in pleural space."},

{question:"9. Which lung lobe is most commonly affected in aspiration pneumonia?",options:["Left upper lobe","Right lower lobe","Left lower lobe","Right middle lobe"],answer:1,explanation:"Aspiration pneumonia commonly affects the right lower lobe due to the vertical bronchus."},

{question:"10. Which test measures lung volumes and airflow?",options:["Bronchoscopy","Spirometry","Pulse oximetry","Chest X-ray"],answer:1,explanation:"Spirometry measures lung volumes such as FEV1 and FVC."},

{question:"11. Which disease is characterized by permanent bronchial dilation?",options:["Asthma","Bronchiectasis","COPD","Tuberculosis"],answer:1,explanation:"Bronchiectasis causes irreversible dilation of bronchi due to chronic infection."},

{question:"12. Which organism causes whooping cough?",options:["Bordetella pertussis","Mycoplasma pneumoniae","Legionella pneumophila","Streptococcus pneumoniae"],answer:0,explanation:"Bordetella pertussis causes pertussis or whooping cough."},

{question:"13. Which lung disease is associated with asbestos exposure?",options:["Silicosis","Asbestosis","Byssinosis","Bagassosis"],answer:1,explanation:"Asbestosis results from inhalation of asbestos fibers."},

{question:"14. Which symptom is most typical of pulmonary embolism?",options:["Gradual cough","Sudden dyspnea","Chronic wheeze","Night sweats"],answer:1,explanation:"Pulmonary embolism commonly presents with sudden onset dyspnea."},

{question:"15. Which organism causes atypical pneumonia in young adults?",options:["Streptococcus pneumoniae","Mycoplasma pneumoniae","Klebsiella pneumoniae","Pseudomonas aeruginosa"],answer:1,explanation:"Mycoplasma pneumoniae is a common cause of atypical pneumonia."},

{question:"16. Which condition causes destruction of alveolar walls?",options:["Asthma","Bronchitis","Emphysema","Tuberculosis"],answer:2,explanation:"Emphysema leads to destruction of alveolar septa causing enlarged air spaces."},

{question:"17. Which sign indicates severe asthma attack?",options:["Wheezing","Silent chest","Cough","Fever"],answer:1,explanation:"A silent chest indicates minimal airflow and severe airway obstruction."},

{question:"18. Which investigation confirms pulmonary tuberculosis?",options:["Chest X-ray","Mantoux test","Sputum AFB smear","CT scan"],answer:2,explanation:"Detection of acid-fast bacilli in sputum confirms tuberculosis."},

{question:"19. Which occupational disease occurs in coal miners?",options:["Silicosis","Asbestosis","Coal worker pneumoconiosis","Byssinosis"],answer:2,explanation:"Coal worker pneumoconiosis results from inhalation of coal dust."},

{question:"20. Which condition causes mediastinal shift away from affected side?",options:["Atelectasis","Pulmonary fibrosis","Tension pneumothorax","Bronchitis"],answer:2,explanation:"Tension pneumothorax increases pressure pushing mediastinum away."},

{question:"21. Which respiratory structure is responsible for gas exchange?",options:["Bronchi","Alveoli","Trachea","Bronchioles"],answer:1,explanation:"Gas exchange occurs across the alveolar membrane."},

{question:"22. Which imaging finding indicates pulmonary edema?",options:["Kerley B lines","Cavitation","Hyperinflation","Honeycombing"],answer:0,explanation:"Kerley B lines indicate interstitial pulmonary edema."},

{question:"23. Which disease produces 'blue bloater' patients?",options:["Chronic bronchitis","Emphysema","Asthma","Bronchiectasis"],answer:0,explanation:"Chronic bronchitis patients are called blue bloaters due to cyanosis and fluid retention."},

{question:"24. Which drug is first-line for acute asthma attack?",options:["Salbutamol","Prednisone","Theophylline","Montelukast"],answer:0,explanation:"Short-acting beta-2 agonists like salbutamol relieve acute bronchospasm."},

{question:"25. Which lung cancer is most common overall?",options:["Squamous cell carcinoma","Adenocarcinoma","Small cell carcinoma","Large cell carcinoma"],answer:1,explanation:"Adenocarcinoma is the most common type of lung cancer worldwide."},

{question:"26. Which organism commonly causes hospital-acquired pneumonia?",options:["Mycoplasma pneumoniae","Pseudomonas aeruginosa","Streptococcus pneumoniae","Chlamydia pneumoniae"],answer:1,explanation:"Pseudomonas aeruginosa frequently causes hospital-acquired pneumonia."},

{question:"27. Which disease produces hyperinflated lungs on chest X-ray?",options:["Pulmonary fibrosis","Emphysema","Pleural effusion","Atelectasis"],answer:1,explanation:"Emphysema causes hyperinflation and flattened diaphragm."},

{question:"28. Which condition produces large amounts of purulent sputum?",options:["Asthma","Bronchiectasis","Pulmonary fibrosis","Pneumothorax"],answer:1,explanation:"Bronchiectasis causes chronic productive cough with copious sputum."},

{question:"29. Which disease causes non-caseating granulomas?",options:["Tuberculosis","Sarcoidosis","Histoplasmosis","Aspergillosis"],answer:1,explanation:"Sarcoidosis produces non-caseating granulomas in multiple organs."},

{question:"30. Which parameter decreases in obstructive lung disease?",options:["FEV1/FVC ratio","Tidal volume","Vital capacity","Residual volume"],answer:0,explanation:"Obstructive lung diseases reduce the FEV1/FVC ratio."}

]

let index = 0
let correct = 0
let wrong = 0
let userAnswers = new Array(questions.length).fill(null)

let timeLeft = 1800
let timerInterval

function startTimer(){

timerInterval = setInterval(function(){

let minutes = Math.floor(timeLeft/60)
let seconds = timeLeft%60

if(seconds<10) seconds="0"+seconds

document.getElementById("timer").innerHTML =
"Time Left: "+minutes+":"+seconds

timeLeft--

if(timeLeft < 0){
finishQuiz()
}

},1000)

}

function showQuestion(){

let q = questions[index]

document.getElementById("progress").innerHTML =
"<b>Question "+(index+1)+" / "+questions.length+"</b>"

let html = "<div class='question'>"+q.question+"</div>"

q.options.forEach((opt,i)=>{

html += "<div class='option' id='opt"+i+"' onclick='answer("+i+")'>"+opt+"</div>"

})

document.getElementById("quiz").innerHTML = html
document.getElementById("explanation").innerHTML=""

if(userAnswers[index]!==null){

let chosen = userAnswers[index]
let opts = document.querySelectorAll(".option")

opts.forEach(o=>o.style.pointerEvents="none")

if(chosen == q.answer){

document.getElementById("opt"+chosen).classList.add("correct")

}else{

document.getElementById("opt"+chosen).classList.add("wrong")
document.getElementById("opt"+q.answer).classList.add("correct")

}

document.getElementById("explanation").innerHTML =
"<p>"+q.explanation+"</p>"

}

}

function answer(i){

if(userAnswers[index]!==null) return

let q = questions[index]
userAnswers[index] = i

let opts = document.querySelectorAll(".option")
opts.forEach(o=>o.style.pointerEvents="none")

if(i==q.answer){

document.getElementById("opt"+i).classList.add("correct")
correct++

}else{

document.getElementById("opt"+i).classList.add("wrong")
document.getElementById("opt"+q.answer).classList.add("correct")
wrong++

}

document.getElementById("correct").innerText = correct
document.getElementById("wrong").innerText = wrong

document.getElementById("explanation").innerHTML =
"<p>"+q.explanation+"</p>"

}

function nextQuestion(){

if(index < questions.length-1){

index++
showQuestion()

}else{

finishQuiz()

}

}

function prevQuestion(){

if(index>0){

index--
showQuestion()

}

}

function finishQuiz(){

clearInterval(timerInterval)

document.getElementById("quiz").innerHTML=""

document.getElementById("score").innerHTML =
"<h2>Quiz Finished</h2>"+
"<p><b>Correct:</b> "+correct+"</p>"+
"<p><b>Wrong:</b> "+wrong+"</p>"+
"<p><b>Total:</b> "+questions.length+"</p>"

document.getElementById("review").innerHTML =
"<button onclick='reviewWrong()'>Review Wrong Answers</button>"

}

function reviewWrong(){

let html="<h3>Wrong Questions</h3>"

questions.forEach((q,i)=>{

if(userAnswers[i]!==null && userAnswers[i]!=q.answer){

html+="<div style='margin-bottom:20px'>"
html+="<b>"+q.question+"</b><br>"
html+="Your Answer: "+q.options[userAnswers[i]]+"<br>"
html+="Correct: "+q.options[q.answer]+"<br>"
html+="<i>"+q.explanation+"</i>"
html+="</div>"

}

})

document.getElementById("review").innerHTML=html

}

startTimer()
showQuestion()

showQuestion()

</script>

</body>
</html>
