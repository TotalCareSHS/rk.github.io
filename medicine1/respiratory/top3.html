<script>

const questions=[

{question:"1. A patient presents with progressive dyspnea and dry cough. HRCT shows reticular shadows and honeycombing. Diagnosis?",options:["Pulmonary fibrosis","Bronchiectasis","COPD","Asthma"],answer:0,explanation:"Idiopathic pulmonary fibrosis causes progressive dyspnea with honeycomb pattern on HRCT."},

{question:"17. Which lung disease causes irreversible bronchial dilation?",options:["Asthma","Bronchiectasis","COPD","Fibrosis"],answer:1,explanation:"Bronchiectasis causes permanent bronchial dilation."},

{question:"21. Which respiratory disease causes airway hyperresponsiveness?",options:["Asthma","Fibrosis","Bronchitis","Tuberculosis"],answer:0,explanation:"Asthma involves hyperresponsive airways."},

{question:"22. Which condition causes productive cough lasting more than 3 months per year?",options:["Chronic bronchitis","Asthma","Tuberculosis","Bronchiectasis"],answer:0,explanation:"Definition of chronic bronchitis."},

{question:"24. Which sign indicates lung consolidation?",options:["Bronchial breath sounds","Hyperresonance","Reduced fremitus","Silent chest"],answer:0,explanation:"Consolidation transmits bronchial breath sounds."},

{question:"45. Which sign indicates pleural effusion?",options:["Stony dull percussion","Hyperresonance","Bronchial breathing","Crackles"],answer:0,explanation:"Pleural fluid causes stony dullness."},

{question:"46. Which lung cancer has worst prognosis?",options:["Small cell carcinoma","Adenocarcinoma","Squamous carcinoma","Carcinoid"],answer:0,explanation:"Small cell lung cancer spreads rapidly."},

{question:"47. Which disease produces cavitary lesions in lungs?",options:["Tuberculosis","Asthma","Bronchitis","COPD"],answer:0,explanation:"Pulmonary TB often causes cavitation."},

{question:"48. Which investigation stages lung cancer?",options:["CT scan","Spirometry","Chest X-ray","Pulse oximetry"],answer:0,explanation:"CT scan helps stage lung cancer."},

{question:"49. Which respiratory disease causes chronic airway inflammation with mucus hypersecretion?",options:["Asthma","Fibrosis","Sarcoidosis","Tuberculosis"],answer:0,explanation:"Asthma causes airway inflammation."},

{question:"50. Which lung disease causes decreased diffusion capacity?",options:["Pulmonary fibrosis","Asthma","Bronchitis","COPD"],answer:0,explanation:"Fibrotic lungs impair gas diffusion."}

]

let index = 0
let correct = 0
let wrong = 0
let userAnswers = new Array(questions.length).fill(null)

let timeLeft = 3000
let timerInterval

function startTimer(){

timerInterval = setInterval(function(){

let minutes = Math.floor(timeLeft/60)
let seconds = timeLeft%60

if(seconds<10) seconds="0"+seconds

document.getElementById("timer").innerHTML =
"Time Left: "+minutes+":"+seconds

timeLeft--

if(timeLeft < 0){
finishQuiz()
}

},1000)

}

function showQuestion(){

let q = questions[index]

document.getElementById("progress").innerHTML =
"<b>Question "+(index+1)+" / "+questions.length+"</b>"

let html = "<div class='question'>"+q.question+"</div>"

q.options.forEach((opt,i)=>{

html += "<div class='option' id='opt"+i+"' onclick='answer("+i+")'>"+opt+"</div>"

})

document.getElementById("quiz").innerHTML = html
document.getElementById("explanation").innerHTML=""

if(userAnswers[index]!==null){

let chosen = userAnswers[index]
let opts = document.querySelectorAll(".option")

opts.forEach(o=>o.style.pointerEvents="none")

if(chosen == q.answer){

document.getElementById("opt"+chosen).classList.add("correct")

}else{

document.getElementById("opt"+chosen).classList.add("wrong")
document.getElementById("opt"+q.answer).classList.add("correct")

}

document.getElementById("explanation").innerHTML =
"<p>"+q.explanation+"</p>"

}

}

function answer(i){

if(userAnswers[index]!==null) return

let q = questions[index]
userAnswers[index] = i

let opts = document.querySelectorAll(".option")
opts.forEach(o=>o.style.pointerEvents="none")

if(i==q.answer){

document.getElementById("opt"+i).classList.add("correct")
correct++

}else{

document.getElementById("opt"+i).classList.add("wrong")
document.getElementById("opt"+q.answer).classList.add("correct")
wrong++

}

document.getElementById("correct").innerText = correct
document.getElementById("wrong").innerText = wrong

document.getElementById("explanation").innerHTML =
"<p>"+q.explanation+"</p>"

}

function nextQuestion(){

if(index < questions.length-1){

index++
showQuestion()

}else{

finishQuiz()

}

}

function prevQuestion(){

if(index>0){

index--
showQuestion()

}

}

function finishQuiz(){

clearInterval(timerInterval)

document.getElementById("quiz").innerHTML=""

document.getElementById("score").innerHTML =
"<h2>Quiz Finished</h2>"+
"<p><b>Correct:</b> "+correct+"</p>"+
"<p><b>Wrong:</b> "+wrong+"</p>"+
"<p><b>Total:</b> "+questions.length+"</p>"

document.getElementById("review").innerHTML =
"<button onclick='reviewWrong()'>Review Wrong Answers</button>"

}

function reviewWrong(){

let html="<h3>Wrong Questions</h3>"

questions.forEach((q,i)=>{

if(userAnswers[i]!==null && userAnswers[i]!=q.answer){

html+="<div style='margin-bottom:20px'>"
html+="<b>"+q.question+"</b><br>"
html+="Your Answer: "+q.options[userAnswers[i]]+"<br>"
html+="Correct: "+q.options[q.answer]+"<br>"
html+="<i>"+q.explanation+"</i>"
html+="</div>"

}

})

document.getElementById("review").innerHTML=html

}

startTimer()
showQuestion()

showQuestion()

</script>

</body>
