<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<div id="stats">
Correct: <span id="correct">0</span> |
Wrong: <span id="wrong">0</span>
</div>

<div id="timer">Time Left: 30:00</div>
  
<link rel="stylesheet" href="../../assets/style.css">

</head>

<body>

<h2>Medicine 1 – Respiratory – Expected MCQs</h2>

<div id="progress"></div>
<div id="quiz"></div>
<div id="explanation"></div>

<div class="navigation">
<button onclick="prevQuestion()">Previous</button>
<button onclick="nextQuestion()">Next</button>
</div>

<div id="score"></div>
  <div id="review"></div>

<script>

const questions=[

{question:"1. The most common cause of secondary spontaneous pneumothorax is:",
options:["Pulmonary fibrosis","Asthma","COPD","Tuberculosis"],
answer:2,
explanation:"COPD with ruptured emphysematous bullae is the most common cause of secondary spontaneous pneumothorax."},

{question:"2. Which investigation is most sensitive for detecting early pulmonary embolism?",
options:["ECG","CT pulmonary angiography","Spirometry","Chest X-ray"],
answer:1,
explanation:"CT pulmonary angiography is the most sensitive and commonly used diagnostic test for pulmonary embolism."},

{question:"3. Which lung cancer is most commonly seen in non-smokers?",
options:["Large cell carcinoma","Squamous cell carcinoma","Small cell carcinoma","Adenocarcinoma"],
answer:3,
explanation:"Adenocarcinoma is the most common lung cancer in non-smokers and females."},

{question:"4. Which condition causes hyperresonant percussion note on chest examination?",
options:["Pneumothorax","Pulmonary fibrosis","Pneumonia","Pleural effusion"],
answer:0,
explanation:"Air in the pleural cavity during pneumothorax produces hyperresonance on percussion."},

{question:"5. Which organism is the most common cause of hospital-acquired pneumonia?",
options:["Chlamydia pneumoniae","Mycoplasma pneumoniae","Pseudomonas aeruginosa","Streptococcus pneumoniae"],
answer:2,
explanation:"Pseudomonas aeruginosa is a frequent pathogen in hospital-acquired pneumonia."},

{question:"6. The Mantoux test is used to detect:",
options:["Tuberculin hypersensitivity","TB exposure","Active tuberculosis","Past TB infection"],
answer:1,
explanation:"Mantoux test detects delayed hypersensitivity to tuberculin indicating prior exposure to TB."},

{question:"7. Which respiratory disease causes digital clubbing most commonly?",
options:["Lung cancer","Emphysema","Asthma","Bronchitis"],
answer:0,
explanation:"Clubbing is commonly associated with lung cancer due to chronic hypoxia."},

{question:"8. Which symptom is most characteristic of bronchial asthma?",
options:["Chest trauma","Productive cough","Hemoptysis","Wheezing"],
answer:3,
explanation:"Wheezing due to bronchospasm is the hallmark symptom of bronchial asthma."},

{question:"9. Which lobe of lung is most commonly affected in tuberculosis?",
options:["Middle lobe","Lingula","Upper lobe","Lower lobe"],
answer:2,
explanation:"Pulmonary tuberculosis typically affects upper lobes due to higher oxygen tension."},

{question:"10. Which respiratory condition leads to decreased lung compliance?",
options:["Asthma","Pulmonary fibrosis","COPD","Bronchiectasis"],
answer:1,
explanation:"Fibrosis stiffens lung tissue causing reduced compliance."},

{question:"11. Which investigation measures arterial oxygen and carbon dioxide levels?",
options:["Spirometry","Pulse oximetry","Chest CT","Arterial blood gas"],
answer:3,
explanation:"ABG measures PaO2 and PaCO2."},

{question:"12. Which condition produces mediastinal shift toward the affected side?",
options:["Atelectasis","Pleural effusion","Emphysema","Tension pneumothorax"],
answer:0,
explanation:"Atelectasis pulls mediastinum toward the collapsed lung."},

{question:"13. Which disease is associated with 'pink puffer' patients?",
options:["Chronic bronchitis","Asthma","Emphysema","Bronchiectasis"],
answer:2,
explanation:"Emphysema patients are called pink puffers due to hyperventilation."},

{question:"14. Which condition produces productive cough with foul-smelling sputum?",
options:["Asthma","Pleural effusion","Bronchiectasis","Pulmonary fibrosis"],
answer:2,
explanation:"Bronchiectasis produces copious foul-smelling sputum."},

{question:"15. Which investigation is most useful for staging lung cancer?",
options:["Spirometry","CT scan","Chest X-ray","Sputum smear"],
answer:1,
explanation:"CT scan helps stage lung cancer."},

{question:"16. Which organism causes atypical pneumonia with walking pneumonia symptoms?",
options:["Mycoplasma pneumoniae","Pseudomonas aeruginosa","Klebsiella pneumoniae","Staphylococcus aureus"],
answer:0,
explanation:"Mycoplasma pneumoniae causes walking pneumonia."},

{question:"17. Which condition produces stony dullness on percussion?",
options:["Pleural effusion","Asthma","Bronchitis","Emphysema"],
answer:0,
explanation:"Pleural fluid produces stony dullness."},

{question:"18. Which respiratory muscle is most important during inspiration?",
options:["Abdominal muscles","Diaphragm","Scalene muscles","Intercostal muscles"],
answer:1,
explanation:"The diaphragm is the primary muscle of inspiration."},

{question:"19. Which occupational lung disease occurs in silica exposure?",
options:["Asbestosis","Bagassosis","Silicosis","Byssinosis"],
answer:2,
explanation:"Silica dust causes silicosis."},

{question:"20. Which disease shows non-caseating granulomas?",
options:["Sarcoidosis","Tuberculosis","Aspergillosis","Histoplasmosis"],
answer:0,
explanation:"Sarcoidosis produces non-caseating granulomas."},

{question:"21. Which complication may occur in severe pneumonia?",
options:["Pleural effusion","Pulmonary fibrosis","COPD","Asthma"],
answer:0,
explanation:"Pleural effusion is a common complication."},

{question:"22. Which respiratory disorder shows reduced FEV1/FVC ratio?",
options:["Restrictive lung disease","Obstructive lung disease","Pulmonary embolism","Pleural disease"],
answer:1,
explanation:"Obstructive diseases reduce FEV1/FVC ratio."},

{question:"23. Which lung cancer is commonly located centrally in bronchi?",
options:["Adenocarcinoma","Squamous cell carcinoma","Carcinoid tumor","Large cell carcinoma"],
answer:1,
explanation:"Squamous carcinoma often arises centrally."},

{question:"24. Which sign indicates severe asthma exacerbation?",
options:["Silent chest","Crackles","Pleural rub","Wheezing"],
answer:0,
explanation:"Silent chest indicates severe airway obstruction."},

{question:"25. Which organism is most commonly responsible for lung abscess?",
options:["Chlamydia pneumoniae","Mycoplasma pneumoniae","Anaerobic bacteria","Legionella"],
answer:2,
explanation:"Anaerobic bacteria from aspiration commonly cause lung abscess."},

{question:"26. Which imaging sign suggests pulmonary edema?",
options:["Pleural plaques","Kerley B lines","Honeycombing","Cavitation"],
answer:1,
explanation:"Kerley B lines indicate interstitial pulmonary edema."},

{question:"27. Which respiratory condition leads to barrel-shaped chest?",
options:["Tuberculosis","Asthma","Pneumonia","COPD"],
answer:3,
explanation:"Hyperinflation in COPD produces barrel-shaped chest."},

{question:"28. Which condition causes sudden chest pain and dyspnea in young tall individuals?",
options:["Primary spontaneous pneumothorax","Asthma","Bronchitis","Pulmonary fibrosis"],
answer:0,
explanation:"Primary spontaneous pneumothorax commonly occurs in tall thin young males."},

{question:"29. Which investigation is best to confirm bronchiectasis?",
options:["Spirometry","Bronchoscopy","High-resolution CT scan","Chest X-ray"],
answer:2,
explanation:"HRCT scan is the gold standard for diagnosing bronchiectasis."},

{question:"30. Which lung structure produces surfactant?",
options:["Macrophages","Type II pneumocytes","Ciliated cells","Type I pneumocytes"],
answer:1,
explanation:"Type II pneumocytes produce pulmonary surfactant that reduces alveolar surface tension."}

]

let index = 0
let correct = 0
let wrong = 0
let userAnswers = new Array(questions.length).fill(null)

let timeLeft = 1800
let timerInterval

function startTimer(){

timerInterval = setInterval(function(){

let minutes = Math.floor(timeLeft/60)
let seconds = timeLeft%60

if(seconds<10) seconds="0"+seconds

document.getElementById("timer").innerHTML =
"Time Left: "+minutes+":"+seconds

timeLeft--

if(timeLeft < 0){
finishQuiz()
}

},1000)

}

function showQuestion(){

let q = questions[index]

document.getElementById("progress").innerHTML =
"<b>Question "+(index+1)+" / "+questions.length+"</b>"

let html = "<div class='question'>"+q.question+"</div>"

q.options.forEach((opt,i)=>{

html += "<div class='option' id='opt"+i+"' onclick='answer("+i+")'>"+opt+"</div>"

})

document.getElementById("quiz").innerHTML = html
document.getElementById("explanation").innerHTML=""

if(userAnswers[index]!==null){

let chosen = userAnswers[index]
let opts = document.querySelectorAll(".option")

opts.forEach(o=>o.style.pointerEvents="none")

if(chosen == q.answer){

document.getElementById("opt"+chosen).classList.add("correct")

}else{

document.getElementById("opt"+chosen).classList.add("wrong")
document.getElementById("opt"+q.answer).classList.add("correct")

}

document.getElementById("explanation").innerHTML =
"<p>"+q.explanation+"</p>"

}

}

function answer(i){

if(userAnswers[index]!==null) return

let q = questions[index]
userAnswers[index] = i

let opts = document.querySelectorAll(".option")
opts.forEach(o=>o.style.pointerEvents="none")

if(i==q.answer){

document.getElementById("opt"+i).classList.add("correct")
correct++

}else{

document.getElementById("opt"+i).classList.add("wrong")
document.getElementById("opt"+q.answer).classList.add("correct")
wrong++

}

document.getElementById("correct").innerText = correct
document.getElementById("wrong").innerText = wrong

document.getElementById("explanation").innerHTML =
"<p>"+q.explanation+"</p>"

}

function nextQuestion(){

if(index < questions.length-1){

index++
showQuestion()

}else{

finishQuiz()

}

}

function prevQuestion(){

if(index>0){

index--
showQuestion()

}

}

function finishQuiz(){

clearInterval(timerInterval)

document.getElementById("quiz").innerHTML=""

document.getElementById("score").innerHTML =
"<h2>Quiz Finished</h2>"+
"<p><b>Correct:</b> "+correct+"</p>"+
"<p><b>Wrong:</b> "+wrong+"</p>"+
"<p><b>Total:</b> "+questions.length+"</p>"

document.getElementById("review").innerHTML =
"<button onclick='reviewWrong()'>Review Wrong Answers</button>"

}

function reviewWrong(){

let html="<h3>Wrong Questions</h3>"

questions.forEach((q,i)=>{

if(userAnswers[i]!==null && userAnswers[i]!=q.answer){

html+="<div style='margin-bottom:20px'>"
html+="<b>"+q.question+"</b><br>"
html+="Your Answer: "+q.options[userAnswers[i]]+"<br>"
html+="Correct: "+q.options[q.answer]+"<br>"
html+="<i>"+q.explanation+"</i>"
html+="</div>"

}

})

document.getElementById("review").innerHTML=html

}

startTimer()
showQuestion()

showQuestion()

</script>

</body>
</html>
