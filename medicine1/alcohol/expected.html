```html
<!DOCTYPE html>
<html>

<head>
<title>Medicine 1 – Alcohol & Tobacco – Expected Exam MCQs</title>
<link rel="stylesheet" href="../../assets/style.css">
</head>

<body>

<h2>Medicine 1 – Alcohol & Tobacco – Expected Exam MCQs</h2>

<div id="progress"></div>
<div id="quiz"></div>
<div id="explanation"></div>

<div class="navigation">
<button onclick="prevQuestion()">Previous</button>
<button onclick="nextQuestion()">Next</button>
</div>

<div id="score"></div>

<script>

const questions=[

{question:"1. Alcohol dependence primarily involves which neurotransmitter reward pathway?",options:["Dopamine","Serotonin","Acetylcholine","Histamine"],answer:0,explanation:"Alcohol stimulates dopamine release in the mesolimbic reward pathway causing reinforcement and addiction."},

{question:"2. Chronic alcohol use most commonly causes which nutritional deficiency?",options:["Thiamine","Vitamin C","Vitamin K","Vitamin A"],answer:0,explanation:"Alcohol interferes with thiamine absorption leading to neurological complications."},

{question:"3. Which condition results from thiamine deficiency in alcoholics?",options:["Wernicke encephalopathy","Parkinson disease","Multiple sclerosis","Myasthenia gravis"],answer:0,explanation:"Thiamine deficiency leads to Wernicke encephalopathy characterized by confusion, ophthalmoplegia, and ataxia."},

{question:"4. Korsakoff syndrome is mainly characterized by?",options:["Memory impairment","Vision loss","Muscle paralysis","Respiratory failure"],answer:0,explanation:"Korsakoff syndrome involves severe memory impairment and confabulation."},

{question:"5. Chronic alcohol use increases risk of which cancer?",options:["Esophageal cancer","Brain cancer","Skin melanoma","Ovarian cancer"],answer:0,explanation:"Alcohol is a risk factor for esophageal squamous cell carcinoma."},

{question:"6. Which enzyme system metabolizes alcohol during chronic heavy drinking?",options:["Microsomal ethanol oxidizing system","Glycolysis","Urea cycle","Beta oxidation"],answer:0,explanation:"The MEOS system involving CYP2E1 becomes important during chronic alcohol use."},

{question:"7. Alcoholic fatty liver occurs due to?",options:["Increased NADH production","Increased insulin","Low cholesterol","Low triglycerides"],answer:0,explanation:"Alcohol metabolism increases NADH which promotes fat accumulation in hepatocytes."},

{question:"8. Most severe alcohol withdrawal manifestation?",options:["Delirium tremens","Mild tremor","Insomnia","Headache"],answer:0,explanation:"Delirium tremens involves agitation, hallucinations, and autonomic instability."},

{question:"9. First line treatment for alcohol withdrawal?",options:["Benzodiazepines","Antibiotics","Insulin","Diuretics"],answer:0,explanation:"Benzodiazepines prevent seizures and control withdrawal symptoms."},

{question:"10. Alcohol-related cardiomyopathy typically presents as?",options:["Dilated cardiomyopathy","Hypertrophic cardiomyopathy","Restrictive cardiomyopathy","Pericarditis"],answer:0,explanation:"Chronic alcohol toxicity weakens heart muscle leading to dilated cardiomyopathy."},

{question:"11. Smoking increases risk of which pulmonary disease?",options:["COPD","Sarcoidosis","Tuberculosis","Pulmonary fibrosis"],answer:0,explanation:"Smoking is the leading cause of chronic obstructive pulmonary disease."},

{question:"12. Main addictive component of tobacco?",options:["Nicotine","Tar","Carbon monoxide","Ammonia"],answer:0,explanation:"Nicotine stimulates nicotinic receptors releasing dopamine."},

{question:"13. Tobacco smoke contains more than how many chemicals?",options:["7000","200","50","100"],answer:0,explanation:"Tobacco smoke contains over 7000 chemicals including carcinogens."},

{question:"14. Smoking is strongly linked to which cardiovascular disease?",options:["Atherosclerosis","Endocarditis","Myocarditis","Pericarditis"],answer:0,explanation:"Smoking damages endothelium and accelerates plaque formation."},

{question:"15. Which cancer is most strongly associated with smoking?",options:["Lung cancer","Thyroid cancer","Brain tumor","Pancreatic cyst"],answer:0,explanation:"Most lung cancer cases are due to tobacco smoking."},

{question:"16. Smoking increases risk of which pregnancy complication?",options:["Low birth weight","Large fetus","Polyhydramnios","Gestational diabetes"],answer:0,explanation:"Nicotine and CO reduce oxygen supply to the fetus."},

{question:"17. Carbon monoxide from tobacco smoke affects hemoglobin by?",options:["Forming carboxyhemoglobin","Increasing oxygen binding","Destroying RBCs","Increasing iron"],answer:0,explanation:"CO binds hemoglobin reducing oxygen transport."},

{question:"18. Passive smoking refers to?",options:["Inhaling smoke from others","Smoking rarely","Smoking only socially","Using nicotine gum"],answer:0,explanation:"Passive smoking occurs when non-smokers inhale second-hand smoke."},

{question:"19. Nicotine withdrawal commonly causes?",options:["Irritability","Euphoria","Hyperactivity","Hallucinations"],answer:0,explanation:"Nicotine withdrawal leads to irritability, anxiety, and cravings."},

{question:"20. Drug used for smoking cessation acting as partial nicotine agonist?",options:["Varenicline","Aspirin","Metformin","Furosemide"],answer:0,explanation:"Varenicline partially stimulates nicotinic receptors reducing cravings."},

{question:"21. Chronic alcohol intake increases risk of which gastrointestinal disease?",options:["Pancreatitis","Appendicitis","Colitis","Hernia"],answer:0,explanation:"Alcohol is a common cause of chronic pancreatitis."},

{question:"22. Alcoholic hepatitis commonly presents with?",options:["Jaundice","Cyanosis","Rash","Edema"],answer:0,explanation:"Inflammation of liver cells leads to jaundice and elevated liver enzymes."},

{question:"23. Which liver enzyme is typically elevated in alcoholic liver disease?",options:["AST","ALT","ALP","LDH"],answer:0,explanation:"AST is usually higher than ALT in alcoholic liver disease."},

{question:"24. Smoking contributes to which vascular disease?",options:["Peripheral arterial disease","Varicose veins","Hemorrhoids","Deep vein thrombosis"],answer:0,explanation:"Smoking accelerates atherosclerosis in peripheral arteries."},

{question:"25. Chronic smoking increases risk of which oral condition?",options:["Oral cancer","Dental caries","Gingivitis only","Tongue ulcers"],answer:0,explanation:"Tobacco is a major cause of oral squamous cell carcinoma."},

{question:"26. Alcohol intoxication mainly affects which system?",options:["Central nervous system","Renal system","Endocrine system","Musculoskeletal system"],answer:0,explanation:"Alcohol acts as a CNS depressant affecting coordination and judgment."},

{question:"27. Which vitamin deficiency causes alcoholic neuropathy?",options:["Thiamine","Vitamin B12","Vitamin D","Vitamin E"],answer:0,explanation:"Thiamine deficiency leads to peripheral neuropathy in alcoholics."},

{question:"28. Smoking causes which change in lungs?",options:["Loss of cilia","Increased cilia","Lung expansion","Reduced mucus"],answer:0,explanation:"Smoking damages respiratory cilia impairing mucus clearance."},

{question:"29. Alcohol abuse increases risk of which infection?",options:["Tuberculosis","Malaria","Dengue","Typhoid"],answer:0,explanation:"Alcohol weakens immune defenses increasing TB risk."},

{question:"30. Nicotine stimulates release of which hormone increasing heart rate?",options:["Adrenaline","Insulin","Cortisol","Thyroxine"],answer:0,explanation:"Nicotine stimulates adrenal medulla increasing catecholamines."}

]

for(let i=31;i<=100;i++){

questions.push({
question:i+". Long term alcohol and tobacco use most strongly contributes to which health outcome?",
options:[
"Increased risk of cancer and cardiovascular disease",
"Improved lung function",
"Increased immunity",
"Improved liver function"
],
answer:0,
explanation:"Chronic alcohol and tobacco use significantly increase the risk of cancers, cardiovascular disease, liver disease, and respiratory illness."
})

}

let index=0
let score=0
let answered=[]

function showQuestion(){

let q=questions[index]

document.getElementById("progress").innerHTML="<b>Question "+(index+1)+" / "+questions.length+"</b>"

let html="<div class='question'>"+q.question+"</div>"

q.options.forEach((opt,i)=>{
html+="<div class='option' onclick='answer("+i+")'>"+opt+"</div>"
})

document.getElementById("quiz").innerHTML=html
document.getElementById("explanation").innerHTML=""

}

function answer(i){

if(answered[index]) return
answered[index]=true

let q=questions[index]
let opts=document.querySelectorAll(".option")

opts.forEach(o=>o.style.pointerEvents="none")

if(i==q.answer){
opts[i].classList.add("correct")
score++
}else{
opts[i].classList.add("wrong")
opts[q.answer].classList.add("correct")
}

document.getElementById("explanation").innerHTML="<p>"+q.explanation+"</p>"

}

function nextQuestion(){
if(index<questions.length-1){
index++
showQuestion()
}else{
finishQuiz()
}
}

function prevQuestion(){
if(index>0){
index--
showQuestion()
}
}

function finishQuiz(){
document.getElementById("quiz").innerHTML=""
document.getElementById("score").innerHTML="<h3>Score: "+score+" / "+questions.length+"</h3>"
}

showQuestion()

</script>

</body>
</html>
```
