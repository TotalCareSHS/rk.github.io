<!DOCTYPE html>
<html>
<head>

<title>Total Care MCQ Platform</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="assets/style.css">

</head>

<body>

<header>
<h2>Total Care MCQ Platform</h2>
<p>Smart Health Learning System</p>
</header>

<div class="container">

<h3>Select Category</h3>

<select id="category" onchange="updateTopics()">

<option value="">Select Category</option>

<option value="medicine1">Medicine 1</option>
<option value="medicine2">Medicine 2</option>
<option value="obg">Obs & Gynae</option>

</select>


<h3>Select Topic</h3>

<select id="topic">

<option value="">Select Topic</option>

</select>


<h3>Select MCQ Type</h3>

<select id="type">

<option value="past">Past Paper</option>
<option value="expected">Expected Exam</option>
<option value="highyield">High Yield</option>
<option value="top1">Top Difficult Set-1</option>
<option value="top2">Top Difficult Set-2</option>
<option value="top3">Top Difficult Set-3</option>
<option value="revision100">Revision 100</option>
<option value="examkiller1">Exam Killer Set-1</option>
<option value="examkiller2">Exam Killer Set-2</option>
<option value="examkiller3">Exam Killer Set-3</option>
  
</select>

<br>

<button onclick="openQuiz()">Start Quiz</button>

</div>


<script>

const topics = {

medicine1:[
"cvs",
"respiratory",
"infectious",
"hematology",
"emergency",
"pharmacotherapy",
"dermatology",
"immunology",
"genetics",
"alcohol"
],

medicine2:[
"neurology",
"gastroenterology",
"hepatobiliary",
"nephrology",
"endocrinology",
"toxicology",
"psychiatry",
"electrolytes",
"environmental",
"geriatrics"
]

};


function updateTopics(){

let category=document.getElementById("category").value;

let topicSelect=document.getElementById("topic");

topicSelect.innerHTML="";

topics[category].forEach(topic=>{

let option=document.createElement("option");

option.value=topic;

option.text=topic.toUpperCase();

topicSelect.add(option);

});

}


function openQuiz(){

let category=document.getElementById("category").value;

let topic=document.getElementById("topic").value;

let type=document.getElementById("type").value;

let file = category+"/"+topic+"/"+type+".html";

window.location.href=file;

}

</script>

</body>

</html>
